# ──────────────────────────────────────────────────────
#  ETTAAROUF TOURISME — Configuration Netlify
#  Next.js 15 App Router via @netlify/plugin-nextjs
# ──────────────────────────────────────────────────────

[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION        = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Plugin Next.js officiel — gère SSR/ISR/Edge sur Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Redirections ────────────────────────────────────────
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

# ── Headers de sécurité & performance ──────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── Cache statique agressif ────────────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Variables d'environnement (override local par contexte) ─
[context.production.environment]
  NEXT_PUBLIC_SITE_URL = "https://www.ettaarouf-tourisme.dz"

[context.deploy-preview.environment]
  NEXT_PUBLIC_SITE_URL = "https://preview.ettaarouf-tourisme.dz"

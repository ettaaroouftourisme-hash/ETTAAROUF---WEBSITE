<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Gradient cercle fond -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </radialGradient>
    <!-- Gradient soleil -->
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#E05000"/>
    </radialGradient>
    <!-- Gradient lapis -->
    <linearGradient id="lapisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C1E3F"/>
      <stop offset="100%" stop-color="#1A3A6B"/>
    </linearGradient>
    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8912A"/>
      <stop offset="50%" stop-color="#E5C97B"/>
      <stop offset="100%" stop-color="#C8A45A"/>
    </linearGradient>
    <!-- Ombre portée -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
    <!-- Glow soleil -->
    <filter id="sunGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Cercle de fond principal ── -->
  <circle cx="250" cy="250" r="235" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- ── Bordure dorée extérieure ── -->
  <circle cx="250" cy="250" r="235" fill="none" stroke="url(#goldGrad)" stroke-width="3.5"/>

  <!-- ── Bordure dorée intérieure fine ── -->
  <circle cx="250" cy="250" r="225" fill="none" stroke="#C8A45A" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ══════════════════════════════════════════════
       CALLIGRAPHIE ARABE — التعارف
       Style inspiré du logo original
  ══════════════════════════════════════════════ -->

  <!-- Corps principal de la lettre Alef-Lam (ا ل) — trait calligraphique gauche -->
  <path d="M 118 195 C 115 155 120 130 128 118 C 134 110 142 108 148 112
           C 156 118 158 132 155 155 C 152 175 145 195 140 215 L 138 280"
        fill="none" stroke="url(#lapisGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lettre Ta (ت) — arc supérieur -->
  <path d="M 148 145 C 165 130 195 122 225 120 C 255 118 285 122 308 132
           C 325 140 335 152 332 165 C 330 175 320 180 305 178
           C 285 175 260 165 238 160 C 215 155 195 155 178 162"
        fill="none" stroke="url(#lapisGrad)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Points du Ta (ت) — deux points au-dessus -->
  <ellipse cx="240" cy="104" rx="5" ry="5" fill="#0C1E3F"/>
  <ellipse cx="265" cy="100" rx="5" ry="5" fill="#0C1E3F"/>

  <!-- Arc principal corps العارف — partie centrale -->
  <path d="M 175 162 C 185 170 200 178 220 182 C 245 187 275 185 298 178
           C 318 172 332 162 338 148 C 344 134 340 120 330 112
           C 315 100 290 95 265 93 C 238 91 210 96 190 107"
        fill="none" stroke="url(#lapisGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Trait courbe Ra (ر) — descente droite -->
  <path d="M 332 148 C 345 155 360 168 368 185 C 374 198 372 212 362 222
           C 350 234 330 238 308 235 C 285 232 262 222 248 210"
        fill="none" stroke="url(#lapisGrad)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Queue calligraphique finale — extension gauche basse -->
  <path d="M 130 215 C 128 235 130 258 135 272 C 140 286 150 295 168 298
           C 195 303 235 298 265 288 C 295 278 320 262 335 245"
        fill="none" stroke="url(#lapisGrad)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Empattement inférieur gauche (base calligraphique) -->
  <path d="M 115 300 C 130 308 155 312 180 310 C 210 307 240 298 255 288"
        fill="none" stroke="url(#lapisGrad)" stroke-width="10" stroke-linecap="round"/>

  <!-- Trait horizontal décoratif supérieur -->
  <path d="M 108 175 C 115 170 130 168 148 170"
        fill="none" stroke="url(#lapisGrad)" stroke-width="9" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════════════
       SOLEIL / ICÔNE VOYAGE — centre du logo
  ══════════════════════════════════════════════ -->

  <!-- Lueur de fond soleil -->
  <circle cx="250" cy="178" r="22" fill="#FFE08A" opacity="0.35"/>

  <!-- Corps du soleil -->
  <circle cx="250" cy="178" r="14" fill="url(#sunGrad)" filter="url(#sunGlow)"/>

  <!-- Rayons du soleil -->
  <g stroke="#FF8C00" stroke-width="2.5" stroke-linecap="round">
    <!-- 8 rayons réguliers -->
    <line x1="250" y1="155" x2="250" y2="148"/>
    <line x1="266" y1="161" x2="271" y2="155"/>
    <line x1="273" y1="178" x2="280" y2="178"/>
    <line x1="266" y1="195" x2="271" y2="201"/>
    <line x1="250" y1="201" x2="250" y2="208"/>
    <line x1="234" y1="195" x2="229" y2="201"/>
    <line x1="227" y1="178" x2="220" y2="178"/>
    <line x1="234" y1="161" x2="229" y2="155"/>
  </g>

  <!-- Collines/horizon sous le soleil (motif voyage) -->
  <path d="M 215 198 Q 230 186 250 192 Q 270 198 285 188"
        fill="none" stroke="#2D7A3E" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M 208 205 Q 228 193 250 200 Q 272 207 292 196"
        fill="none" stroke="#2D7A3E" stroke-width="2.2" stroke-linecap="round" opacity="0.7"/>

  <!-- ══════════════════════════════════════════════
       TEXTE ARABE — التعارف للسياحة والإسفار
  ══════════════════════════════════════════════ -->

  <!-- Ligne décorative dorée au-dessus du texte arabe -->
  <path d="M 145 318 L 355 318" stroke="url(#goldGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="250" cy="318" r="3" fill="#C8A45A"/>

  <!-- Texte arabe principal -->
  <text
    x="250" y="345"
    font-family="'Noto Naskh Arabic', 'Arabic Typesetting', 'Times New Roman', serif"
    font-size="22"
    font-weight="600"
    text-anchor="middle"
    fill="#0C1E3F"
    direction="rtl"
    unicode-bidi="embed"
  >التعارف للسياحة والإسفار</text>

  <!-- Ligne décorative dorée sous le texte arabe -->
  <path d="M 165 358 L 335 358" stroke="url(#goldGrad)" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>

  <!-- ══════════════════════════════════════════════
       TEXTE FRANÇAIS
  ══════════════════════════════════════════════ -->

  <!-- Texte français principal -->
  <text
    x="250" y="388"
    font-family="'Cormorant Garamond', 'Georgia', serif"
    font-size="15.5"
    font-weight="600"
    letter-spacing="4"
    text-anchor="middle"
    fill="#0C1E3F"
  >ETTAAROUF</text>

  <!-- Sous-titre français -->
  <text
    x="250" y="410"
    font-family="'DM Sans', 'Helvetica Neue', sans-serif"
    font-size="9.5"
    font-weight="400"
    letter-spacing="3.5"
    text-anchor="middle"
    fill="#C8A45A"
  >TOURISME ET VOYAGES</text>

  <!-- Ornements décoratifs dorés autour du texte français -->
  <path d="M 125 388 L 148 388" stroke="url(#goldGrad)" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M 352 388 L 375 388" stroke="url(#goldGrad)" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="138" cy="388" r="2" fill="#C8A45A"/>
  <circle cx="362" cy="388" r="2" fill="#C8A45A"/>

  <!-- ══════════════════════════════════════════════
       ORNEMENTS CALLIGRAPHIQUES DÉCORATIFS
  ══════════════════════════════════════════════ -->

  <!-- Ornement gauche (arabesque) -->
  <g opacity="0.25" fill="#C8A45A">
    <path d="M 62 250 C 68 240 78 238 82 248 C 86 258 78 268 70 265 C 62 262 60 252 66 246
             C 70 242 76 243 78 250 C 80 257 74 261 70 258"/>
    <circle cx="56" cy="250" r="2.5"/>
    <circle cx="88" cy="250" r="2.5"/>
  </g>

  <!-- Ornement droit (arabesque) -->
  <g opacity="0.25" fill="#C8A45A">
    <path d="M 438 250 C 432 240 422 238 418 248 C 414 258 422 268 430 265 C 438 262 440 252 434 246
             C 430 242 424 243 422 250 C 420 257 426 261 430 258"/>
    <circle cx="444" cy="250" r="2.5"/>
    <circle cx="412" cy="250" r="2.5"/>
  </g>

</svg>
